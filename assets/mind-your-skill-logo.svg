    <text x="4" y="168" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="42" font-weight="500" letter-spacing="1" fill="#51627D">Open-source skill library for Hermes Agent</text>
