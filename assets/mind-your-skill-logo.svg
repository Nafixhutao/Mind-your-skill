    <circle cx="405" cy="365" r="20" fill="#7C3AED"/>
    <circle cx="363" cy="157" r="24" fill="#07135F"/>
    <circle cx="150" cy="430" r="17" fill="#7C3AED"/>
    <rect x="174" y="102" width="33" height="33" rx="5" fill="#2474FF"/>
    <rect x="238" y="68" width="40" height="40" rx="6" fill="#2474FF"/>
