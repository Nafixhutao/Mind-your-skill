    <path d="M178 330C151 252 186 165 260 129C310 105 367 109 413 139C385 140 362 158 356 184C348 222 382 250 413 235C392 320 316 373 236 358C215 354 195 344 178 330Z" fill="url(#g3)"/>
    <path d="M307 106C379 132 426 203 414 279C409 315 392 348 366 373C391 286 342 214 273 203C231 196 192 212 162 240C177 176 228 126 307 106Z" fill="url(#g2)" opacity="0.98"/>
    <path d="M162 241C190 207 230 190 274 197C326 205 367 242 381 293C342 238 267 236 215 285C191 308 177 336 176 364C152 331 144 285 162 241Z" fill="#FFFFFF" opacity="0.98"/>

