<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mind Your Skill</title>
  <desc id="desc">Abstract logo and wordmark for Mind Your Skill, an open-source skill library for Hermes Agent.</desc>
  <defs>
    <linearGradient id="g1" x1="110" y1="90" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14E0FF"/>
      <stop offset="0.45" stop-color="#2474FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="g2" x1="235" y1="105" x2="405" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0FE3FF"/>
